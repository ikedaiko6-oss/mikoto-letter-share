<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <defs>
    <filter id="paper-noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0.22 0 0 0 0.62
        0 0.18 0 0 0.52
        0 0 0.12 0 0.38
        0 0 0 0.28 0" result="fiber"/>
      <feBlend in="SourceGraphic" in2="fiber" mode="multiply"/>
    </filter>
    <pattern id="fibers" width="42" height="38" patternUnits="userSpaceOnUse">
      <path d="M2 8c15 5 26-7 38-2M6 24c9-6 22 4 33 0M0 34c12-3 25 6 40 1" fill="none" stroke="#9b7a4e" stroke-width=".55" opacity=".16"/>
      <path d="M12 0c-2 13 5 25 1 38M31 2c4 11-3 23 1 36" fill="none" stroke="#fffaf0" stroke-width=".7" opacity=".22"/>
    </pattern>
  </defs>
  <rect width="360" height="360" fill="#f4ead8" filter="url(#paper-noise)"/>
  <rect width="360" height="360" fill="url(#fibers)" opacity=".8"/>
  <g opacity=".2" fill="#7d603b">
    <circle cx="42" cy="26" r="1.1"/>
    <circle cx="146" cy="82" r=".8"/>
    <circle cx="292" cy="54" r="1"/>
    <circle cx="328" cy="198" r=".9"/>
    <circle cx="86" cy="268" r="1"/>
