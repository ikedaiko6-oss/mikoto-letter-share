<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>奉納をお預かりしました | 夜見の響き</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shrine-bar" aria-hidden="true"></div>
    <main class="shell">
      <section class="hero shrine-hero">
        <div class="emblem-circle" aria-hidden="true">占</div>
        <p class="eyebrow">夜見神社 御言葉の社</p>
        <h1 class="app-title">奉納をお預かりしました</h1>
        <p class="lead lead-text">
          封じられた六つの書を開く準備が整いました。
        </p>
      </section>

      <section class="premium sealed-books thank-you-panel">
        <p class="eyebrow">封じられた六つの書</p>
        <h2>この先の御書へ</h2>
        <p>
          お預かりした問いをもとに、本音のかたち、縁のながれ、今宵のしるし、手放すもの、道の分かれ、ミコトの結びを開きます。
        </p>
        <div class="unlocked-books" id="premium-unlocked"></div>
        <p class="care-note hidden" id="premium-empty">
          先に今日の御書を開いてください。問いをお預かりしてから、六つの書を記します。
        </p>
        <p class="care-note">
          占いは結論を代わりに決めるものではありません。危険、暴力、法律、医療、お金の深刻な問題がある場合は、信頼できる人や専門窓口にも相談してください。
        </p>
        <a class="return-link" href="./index.html">今日の御書へ戻る</a>
      </section>
    </main>
    <script src="./js/config.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/engine.js"></script>
    <script src="./js/premium-result.js"></script>
  </body>
</html>
