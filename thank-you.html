<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>奉納をお預かりしました | ミコトからの手紙</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shrine-bar" aria-hidden="true"></div>
    <main class="shell">
      <section class="hero shrine-hero">
        <div class="emblem-circle" aria-hidden="true">御</div>
        <p class="eyebrow">夜見神社 御言葉の社</p>
        <h1 class="app-title">奉納をお預かりしました</h1>
        <p class="lead lead-text">
          封じられた六つの書を開く準備が整いました。
        </p>
      </section>

      <section class="premium sealed-books thank-you-panel">
        <p class="eyebrow">封じられた六つの書</p>
        <h2>この先の御書へ</h2>
        <p>
          お預かりした問いをもとに、本音のかたち、縁のながれ、今宵のつとめ、手放すもの、道の分かれ、ミコトの結びを記します。
        </p>
        <ul class="unlock-list">
          <li><span>一の書</span> 本音のかたち</li>
          <li><span>二の書</span> 縁のながれ</li>
          <li><span>三の書</span> 今宵のつとめ</li>
          <li><span>四の書</span> 手放すもの</li>
          <li><span>五の書</span> 道の分かれ</li>
          <li><span>六の書</span> ミコトの結び</li>
        </ul>
        <p class="care-note">
          いまは決済後ページの仮置きです。次の実装で、ここに個別の六つの書を表示します。
        </p>
        <a class="return-link" href="./index.html">今日の御書へ戻る</a>
      </section>
    </main>
  </body>
</html>
